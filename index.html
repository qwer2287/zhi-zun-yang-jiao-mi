<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>至尊羊角蜜文学</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=ZCOOL+KuaiLe&family=Noto+Serif+SC:wght@400;700;900&display=swap');

  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    min-height: 100vh;
    background: #1a0a00;
    overflow: hidden;
    font-family: 'Noto Serif SC', 'SimSun', 'STSong', serif;
    cursor: default;
    user-select: none;
  }

  /* ========== 粒子层背景 ========== */
  .particles-bg {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 0;
  }

  /* ========== 主容器 ========== */
  .main-container {
    position: relative;
    z-index: 10;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 20px;
  }

  /* ========== 装饰边框 ========== */
  .decorative-border {
    position: relative;
    width: min(700px, 95vw);
    padding: 50px 40px;
    background: linear-gradient(180deg,
      rgba(60, 20, 10, 0.85) 0%,
      rgba(40, 15, 8, 0.9) 50%,
      rgba(60, 20, 10, 0.85) 100%);
    border: 3px solid #8b6914;
    border-radius: 8px;
    box-shadow:
      0 0 30px rgba(255, 180, 60, 0.15),
      inset 0 0 60px rgba(139, 105, 20, 0.08),
      0 0 0 12px rgba(30, 10, 5, 0.7),
      0 0 0 15px #8b6914,
      0 0 0 18px rgba(30, 10, 5, 0.7);
    text-align: center;
    overflow: visible;
  }

  /* 四角纹饰 */
  .corner-decoration {
    position: absolute;
    width: 40px; height: 40px;
    border-color: #c9972e;
    border-style: solid;
    pointer-events: none;
  }
  .corner-decoration.top-left     { top: -5px;  left: -5px;  border-width: 4px 0 0 4px; }
  .corner-decoration.top-right    { top: -5px;  right: -5px; border-width: 4px 4px 0 0; }
  .corner-decoration.bottom-left  { bottom: -5px; left: -5px; border-width: 0 0 4px 4px; }
  .corner-decoration.bottom-right { bottom: -5px; right: -5px;border-width: 0 4px 4px 0; }

  /* ========== 标题 ========== */
  .site-title {
    font-family: 'Ma Shan Zheng', 'ZCOOL KuaiLe', cursive;
    font-size: clamp(32px, 6vw, 52px);
    color: #f0c060;
    text-shadow:
      0 0 20px rgba(240, 180, 80, 0.5),
      0 2px 4px rgba(0, 0, 0, 0.6),
      0 0 60px rgba(240, 160, 40, 0.3);
    letter-spacing: 6px;
    margin-bottom: 8px;
    animation: titleGlow 3s ease-in-out infinite;
  }

  @keyframes titleGlow {
    0%, 100% { text-shadow: 0 0 20px rgba(240, 180, 80, 0.5), 0 2px 4px rgba(0,0,0,0.6), 0 0 60px rgba(240,160,40,0.3); }
    50%      { text-shadow: 0 0 35px rgba(255, 200, 100, 0.8), 0 2px 4px rgba(0,0,0,0.6), 0 0 90px rgba(255,180,60,0.5); }
  }

  .subtitle {
    font-family: 'Noto Serif SC', serif;
    font-size: clamp(14px, 2.5vw, 18px);
    color: #c9972e;
    letter-spacing: 8px;
    margin-bottom: 30px;
    opacity: 0.8;
  }

  /* ========== 分隔线 ========== */
  .divider {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    margin-bottom: 30px;
  }
  .divider-line {
    width: 60px; height: 1px;
    background: linear-gradient(90deg, transparent, #c9972e, transparent);
  }
  .divider-diamond {
    width: 8px; height: 8px;
    background: #c9972e;
    transform: rotate(45deg);
  }

  /* ========== 输入区域 ========== */
  .input-section {
    position: relative;
    margin-bottom: 25px;
  }

  .creative-input {
    width: 100%;
    min-height: 160px;
    padding: 20px;
    background: rgba(20, 10, 5, 0.7);
    border: 2px solid #6b4f1a;
    border-radius: 6px;
    color: #e0c080;
    font-family: 'Noto Serif SC', serif;
    font-size: 16px;
    line-height: 1.8;
    resize: vertical;
    outline: none;
    transition: all 0.4s ease;
    letter-spacing: 1px;
  }

  .creative-input::placeholder {
    color: rgba(200, 160, 100, 0.35);
    font-style: italic;
    letter-spacing: 2px;
  }

  .creative-input:focus {
    border-color: #c9972e;
    box-shadow:
      0 0 20px rgba(201, 151, 46, 0.2),
      inset 0 0 30px rgba(201, 151, 46, 0.05);
    background: rgba(25, 12, 6, 0.8);
  }

  /* ========== 按钮 ========== */
  .btn-create {
    position: relative;
    display: inline-block;
    padding: 14px 55px;
    font-family: 'Ma Shan Zheng', 'ZCOOL KuaiLe', cursive;
    font-size: 22px;
    letter-spacing: 4px;
    color: #1a0800;
    background: linear-gradient(180deg, #e8b840 0%, #c48820 50%, #a06810 100%);
    border: 2px solid #8b6914;
    border-radius: 4px;
    cursor: pointer;
    transition: all 0.3s ease;
    box-shadow:
      0 4px 15px rgba(200, 140, 40, 0.3),
      0 0 0 4px rgba(30, 10, 5, 0.5),
      0 0 0 6px #6b4f1a;
    overflow: hidden;
  }

  .btn-create::before {
    content: '';
    position: absolute;
    top: 0; left: -100%;
    width: 100%; height: 50%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.25), transparent);
    transition: left 0.5s ease;
  }

  .btn-create:hover {
    background: linear-gradient(180deg, #f5c850 0%, #d49830 50%, #b07818 100%);
    box-shadow:
      0 6px 25px rgba(220, 160, 50, 0.45),
      0 0 0 4px rgba(30, 10, 5, 0.5),
      0 0 0 6px #6b4f1a;
    transform: translateY(-2px);
  }

  .btn-create:hover::before {
    left: 100%;
  }

  .btn-create:active {
    transform: translateY(1px);
    box-shadow:
      0 2px 8px rgba(200, 140, 40, 0.3),
      0 0 0 4px rgba(30, 10, 5, 0.5),
      0 0 0 6px #6b4f1a;
  }

  /* ========== 成功弹窗 ========== */
  .overlay {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: rgba(0, 0, 0, 0);
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: center;
    pointer-events: none;
    transition: background 0.6s ease;
  }

  .overlay.active {
    background: rgba(0, 0, 0, 0.75);
    pointer-events: all;
  }

  .success-modal {
    background: linear-gradient(180deg,
      rgba(50, 15, 5, 0.95) 0%,
      rgba(35, 10, 5, 0.97) 50%,
      rgba(50, 15, 5, 0.95) 100%);
    border: 3px solid #d4a030;
    border-radius: 8px;
    padding: 50px 40px;
    text-align: center;
    max-width: 550px;
    width: 90vw;
    box-shadow:
      0 0 60px rgba(255, 180, 60, 0.3),
      inset 0 0 80px rgba(200, 140, 40, 0.08),
      0 0 0 10px rgba(30, 10, 5, 0.6),
      0 0 0 13px #8b6914;
    transform: scale(0.7) translateY(30px);
    opacity: 0;
    transition: all 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    position: relative;
    z-index: 101;
  }

  .overlay.active .success-modal {
    transform: scale(1) translateY(0);
    opacity: 1;
  }

  .success-icon {
    font-size: 60px;
    margin-bottom: 15px;
    animation: bounceIcon 0.8s ease-in-out infinite alternate;
  }

  @keyframes bounceIcon {
    0% { transform: translateY(0) scale(1); }
    100% { transform: translateY(-10px) scale(1.08); }
  }

  .success-title {
    font-family: 'Ma Shan Zheng', cursive;
    font-size: clamp(26px, 5vw, 38px);
    color: #f0c040;
    text-shadow: 0 0 30px rgba(240, 180, 60, 0.6);
    letter-spacing: 3px;
    margin-bottom: 8px;
    line-height: 1.5;
  }

  .success-subtitle {
    font-family: 'Noto Serif SC', serif;
    font-size: 16px;
    color: #c9972e;
    letter-spacing: 2px;
    margin-bottom: 25px;
    opacity: 0.8;
  }

  .seal-stamp {
    display: inline-block;
    width: 85px; height: 85px;
    border: 4px solid #c03020;
    border-radius: 50%;
    color: #c03020;
    font-family: 'Ma Shan Zheng', cursive;
    font-size: 18px;
    line-height: 85px;
    text-align: center;
    transform: rotate(-15deg);
    opacity: 0.85;
    margin-bottom: 20px;
    box-shadow: 0 0 10px rgba(192, 48, 32, 0.25);
    transition: all 0.4s ease;
  }

  .seal-stamp.super-seal {
    width: 100px; height: 100px;
    border-width: 5px;
    border-color: #ff2020;
    color: #ff2020;
    font-size: 22px;
    line-height: 100px;
    box-shadow: 0 0 30px rgba(255, 30, 20, 0.6);
    animation: sealPulse 0.8s ease-in-out infinite alternate;
  }

  @keyframes sealPulse {
    0% { transform: rotate(-15deg) scale(1); box-shadow: 0 0 20px rgba(255, 30, 20, 0.5); }
    100% { transform: rotate(-15deg) scale(1.1); box-shadow: 0 0 45px rgba(255, 30, 20, 0.85); }
  }

  /* ========== 屏幕震动 ========== */
  @keyframes screenShake {
    0%, 100% { transform: translate(0); }
    10% { transform: translate(-8px, 4px); }
    20% { transform: translate(8px, -6px); }
    30% { transform: translate(-5px, -3px); }
    40% { transform: translate(6px, 7px); }
    50% { transform: translate(-9px, -2px); }
    60% { transform: translate(4px, 8px); }
    70% { transform: translate(-7px, -5px); }
    80% { transform: translate(3px, 2px); }
    90% { transform: translate(-6px, -6px); }
  }

  .shaking {
    animation: screenShake 0.4s ease-in-out infinite;
  }

  /* ========== 特殊效果 Canvas ========== */
  #specialFxCanvas {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 60;
  }

  /* ========== 棕色暗角 ========== */
  .brown-vignette {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 55;
    background: radial-gradient(ellipse at center, transparent 40%, rgba(60, 30, 10, 0.65) 100%);
    opacity: 0;
    transition: opacity 0.8s ease;
  }

  .brown-vignette.active {
    opacity: 1;
  }

  /* ========== 屎飞溅印记 ========== */
  .splat-mark {
    position: fixed;
    pointer-events: none;
    z-index: 62;
    font-size: 40px;
    animation: splatAppear 0.3s ease-out forwards;
  }

  @keyframes splatAppear {
    0% { transform: scale(0.3); opacity: 0; }
    50% { transform: scale(1.3); opacity: 0.9; }
    100% { transform: scale(1); opacity: 0.7; }
  }

  .btn-close {
    display: inline-block;
    padding: 10px 40px;
    font-family: 'Noto Serif SC', serif;
    font-size: 16px;
    letter-spacing: 3px;
    color: #d4a030;
    background: transparent;
    border: 1px solid #8b6914;
    border-radius: 4px;
    cursor: pointer;
    transition: all 0.3s ease;
  }

  .btn-close:hover {
    background: rgba(200, 140, 40, 0.15);
    border-color: #c9972e;
    color: #f0c060;
  }

  /* ========== Canvas 烟花层 ========== */
  #fireworksCanvas {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 50;
  }

  /* ========== 飘落花瓣粒子 ========== */
  .falling-petal {
    position: fixed;
    pointer-events: none;
    z-index: 5;
    animation: petalFall linear forwards;
  }

  @keyframes petalFall {
    0% {
      transform: translateY(-10vh) rotate(0deg) translateX(0);
      opacity: 1;
    }
    70% {
      opacity: 0.7;
    }
    100% {
      transform: translateY(110vh) rotate(720deg) translateX(var(--drift));
      opacity: 0;
    }
  }

  /* ========== 响应式 ========== */
  @media (max-width: 480px) {
    .decorative-border {
      padding: 30px 20px;
    }
    .btn-create {
      padding: 12px 35px;
      font-size: 18px;
    }
    .success-modal {
      padding: 30px 20px;
    }
  }
</style>
</head>
<body>

<!-- 粒子背景 -->
<canvas class="particles-bg" id="particlesBg"></canvas>

<!-- 烟花 Canvas -->
<canvas id="fireworksCanvas"></canvas>

<!-- 特殊效果 Canvas -->
<canvas id="specialFxCanvas"></canvas>

<!-- 棕色暗角 -->
<div class="brown-vignette" id="brownVignette"></div>

<!-- 主界面 -->
<div class="main-container" id="mainPage">
  <div class="decorative-border">
    <div class="corner-decoration top-left"></div>
    <div class="corner-decoration top-right"></div>
    <div class="corner-decoration bottom-left"></div>
    <div class="corner-decoration bottom-right"></div>

    <h1 class="site-title">至尊羊角蜜文学</h1>
    <p class="subtitle">· 笔 落 惊 风 雨 ·</p>

    <div class="divider">
      <span class="divider-line"></span>
      <span class="divider-diamond"></span>
      <span class="divider-line"></span>
    </div>

    <div class="input-section">
      <textarea
        class="creative-input"
        id="creativeInput"
        placeholder="在此挥毫泼墨，写下您心中的故事…"
      ></textarea>
    </div>

    <button class="btn-create" id="btnCreate" onclick="startCreation()">
      完 成 创 作
    </button>
  </div>
</div>

<!-- 成功弹窗 -->
<div class="overlay" id="overlay">
  <div class="success-modal">
    <div class="success-icon" id="successIcon">🏆</div>
    <h2 class="success-title" id="successTitle">恭喜你成为<br>至尊羊角蜜网签约作者</h2>
    <p class="success-subtitle" id="successSubtitle">—— 妙笔生花 · 未来可期 ——</p>
    <div class="seal-stamp" id="sealStamp">签 约</div>
    <br>
    <button class="btn-close" id="closeBtn" onclick="closeModal()">朕 知 道 了</button>
  </div>
</div>

<script>
  // ==================== 粒子背景 ====================
  (function() {
    const canvas = document.getElementById('particlesBg');
    const ctx = canvas.getContext('2d');
    let particles = [];
    let animId;

    function resize() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    class Particle {
      constructor() {
        this.reset();
      }
      reset() {
        this.x = Math.random() * canvas.width;
        this.y = Math.random() * canvas.height;
        this.size = Math.random() * 2 + 0.5;
        this.speedY = Math.random() * 0.3 + 0.1;
        this.speedX = (Math.random() - 0.5) * 0.2;
        this.opacity = Math.random() * 0.5 + 0.15;
        this.glow = Math.random() * 0.5;
      }
      update() {
        this.y -= this.speedY;
        this.x += this.speedX;
        if (this.y < -10) { this.y = canvas.height + 10; this.x = Math.random() * canvas.width; }
        if (this.x < -10) this.x = canvas.width + 10;
        if (this.x > canvas.width + 10) this.x = -10;
      }
      draw() {
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(240, 180, 80, ${this.opacity + this.glow * Math.sin(Date.now() * 0.002 + this.x)})`;
        ctx.fill();
      }
    }

    for (let i = 0; i < 80; i++) {
      particles.push(new Particle());
    }

    function animate() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      particles.forEach(p => { p.update(); p.draw(); });
      animId = requestAnimationFrame(animate);
    }
    animate();
  })();

  // ==================== 飘落花瓣 ====================
  function createPetal() {
    const petal = document.createElement('div');
    petal.className = 'falling-petal';
    const chars = ['🌸', '🍂', '🏵️', '💮', '🌺', '✿'];
    petal.textContent = chars[Math.floor(Math.random() * chars.length)];
    petal.style.left = Math.random() * 95 + '%';
    petal.style.top = '-30px';
    petal.style.fontSize = (Math.random() * 18 + 12) + 'px';
    petal.style.setProperty('--drift', (Math.random() * 120 - 60) + 'px');
    petal.style.animationDuration = (Math.random() * 6 + 8) + 's';
    petal.style.opacity = Math.random() * 0.6 + 0.3;
    document.body.appendChild(petal);

    setTimeout(() => {
      if (petal.parentNode) petal.parentNode.removeChild(petal);
    }, 15000);
  }

  // 持续飘落
  setInterval(() => {
    if (Math.random() < 0.5) createPetal();
  }, 1800);
  for (let i = 0; i < 5; i++) setTimeout(createPetal, i * 400);

  // ==================== 烟花特效 ====================
  (function() {
    const canvas = document.getElementById('fireworksCanvas');
    const ctx = canvas.getContext('2d');
    let fireworks = [];
    let fwAnimId = null;
    let isRunning = false;

    function resize() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    class Spark {
      constructor(x, y, color) {
        this.x = x;
        this.y = y;
        const angle = Math.random() * Math.PI * 2;
        const speed = Math.random() * 6 + 2;
        this.vx = Math.cos(angle) * speed;
        this.vy = Math.sin(angle) * speed;
        this.color = color;
        this.life = 1;
        this.decay = Math.random() * 0.015 + 0.008;
        this.size = Math.random() * 3 + 1.5;
        this.gravity = 0.03;
        this.trail = [];
      }

      update() {
        this.trail.push({ x: this.x, y: this.y, life: this.life });
        if (this.trail.length > 8) this.trail.shift();

        this.x += this.vx;
        this.y += this.vy;
        this.vy += this.gravity;
        this.vx *= 0.99;
        this.life -= this.decay;
      }

      draw() {
        // 拖尾
        for (let i = 0; i < this.trail.length; i++) {
          const t = this.trail[i];
          const alpha = (i / this.trail.length) * this.life * 0.4;
          ctx.beginPath();
          ctx.arc(t.x, t.y, this.size * 0.6, 0, Math.PI * 2);
          ctx.fillStyle = this.color.replace('1)', `${alpha})`);
          ctx.fill();
        }
        // 主体
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fillStyle = this.color.replace('1)', `${Math.max(0, this.life)})`);
        ctx.fill();
        // 光晕
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size * 2.5, 0, Math.PI * 2);
        ctx.fillStyle = this.color.replace('1)', `${Math.max(0, this.life * 0.2)})`);
        ctx.fill();
      }
    }

    class Rocket {
      constructor(enhanced = false) {
        this.x = Math.random() * canvas.width * 0.8 + canvas.width * 0.1;
        this.y = canvas.height;
        this.targetY = Math.random() * canvas.height * 0.5 + canvas.height * 0.08;
        this.speed = Math.random() * 4 + 5;
        this.enhanced = enhanced;
        this.color = enhanced ? megaColor() : randomFireworkColor();
        this.trailParticles = [];
        this.exploded = false;
      }

      update() {
        if (!this.exploded) {
          this.trailParticles.push({
            x: this.x + (Math.random() - 0.5) * 3,
            y: this.y,
            life: 1
          });
          if (this.trailParticles.length > 20) this.trailParticles.shift();

          this.y -= this.speed;
          if (this.y <= this.targetY) {
            this.explode();
            return false;
          }
          return true;
        }
        return false;
      }

      draw() {
        if (this.exploded) return;
        // 火箭拖尾
        for (let i = 0; i < this.trailParticles.length; i++) {
          const p = this.trailParticles[i];
          const alpha = (i / this.trailParticles.length) * 0.5;
          ctx.beginPath();
          ctx.arc(p.x, p.y, 2, 0, Math.PI * 2);
          ctx.fillStyle = `rgba(255, 200, 80, ${alpha})`;
          ctx.fill();
        }
        // 火箭头
        ctx.beginPath();
        ctx.arc(this.x, this.y, 3, 0, Math.PI * 2);
        ctx.fillStyle = '#fff';
        ctx.fill();
      }

      explode() {
        this.exploded = true;
        const baseSparks = this.enhanced ? 220 : 80;
        const sparkCount = Math.floor(Math.random() * 60 + baseSparks);
        for (let i = 0; i < sparkCount; i++) {
          const s = new Spark(this.x, this.y, this.color);
          if (this.enhanced) {
            s.size = Math.random() * 6 + 2.5;
            s.decay = Math.random() * 0.006 + 0.004;
            s.vx *= 1.6; s.vy *= 1.6;
          }
          fireworks.push(s);
        }
        // 内层粒子（更亮更密）
        const innerCount = this.enhanced ? 100 : 30;
        for (let i = 0; i < innerCount; i++) {
          const s = new Spark(this.x, this.y, this.color);
          s.vx *= 0.5; s.vy *= 0.5;
          s.size *= this.enhanced ? 3 : 1.5;
          s.decay *= 0.7;
          fireworks.push(s);
        }
        // 震撼模式：第二圈超大光环
        if (this.enhanced) {
          for (let i = 0; i < 60; i++) {
            const s = new Spark(this.x, this.y, 'rgba(255, 240, 180, 1)');
            s.vx *= 0.25; s.vy *= 0.25;

    function megaColor() {
      const colors = [

        'rgba(255, 200, 15, 1)',  // 耀金
        'rgba(255, 240, 50, 1)',  // 炫金

        'rgba(255, 220, 80, 1)',  // 白金

      ];

    const rockets = [];
    let rocketTimer = 0;
    let currentMode = 'normal';

    function animate() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      // 发射火箭
      rocketTimer++;
      const fireRate = currentMode === 'enhanced' ? 3 : 8;
      const maxRockets = currentMode === 'enhanced' ? 25 : 6;
      if (rocketTimer > fireRate && rockets.length < maxRockets) {
        rockets.push(new Rocket(currentMode === 'enhanced'));
        rocketTimer = 0;
      }

      // 更新火箭
      for (let i = rockets.length - 1; i >= 0; i--) {
        const alive = rockets[i].update();
        rockets[i].draw();
        if (!alive) rockets.splice(i, 1);
      }

      // 更新烟花粒子
      for (let i = fireworks.length - 1; i >= 0; i--) {
        fireworks[i].update();
        fireworks[i].draw();
        if (fireworks[i].life <= 0) fireworks.splice(i, 1);
      }

      // 停止条件：没有东西在显示
      const stopDelay = currentMode === 'enhanced' ? 300 : 100;
      if (rockets.length === 0 && fireworks.length === 0 && rocketTimer > stopDelay) {
        stopFireworks();
        currentMode = 'normal';
        return;
      }

      fwAnimId = requestAnimationFrame(animate);
    }

    function startFireworks(enhanced = false) {
      // 停止当前烟花
      if (fwAnimId) {
        cancelAnimationFrame(fwAnimId);
        fwAnimId = null;
      }
      isRunning = true;
      rocketTimer = 0;
      fireworks = [];
      rockets.length = 0;
      currentMode = enhanced ? 'enhanced' : 'normal';
      // 初始发射一波
      const initialCount = enhanced ? 15 : 5;
      for (let i = 0; i < initialCount; i++) {
        setTimeout(() => rockets.push(new Rocket(enhanced)), i * (enhanced ? 80 : 200));
      }
      // 震撼模式：后续多波齐射
      if (enhanced) {
        for (let wave = 1; wave <= 4; wave++) {
          setTimeout(() => {
            for (let i = 0; i < 10; i++) {
              setTimeout(() => rockets.push(new Rocket(true)), i * 60);
            }
          }, wave * 2500);
        }
      }
      animate();
    }

    function stopFireworks() {
      isRunning = false;
      if (fwAnimId) {
        cancelAnimationFrame(fwAnimId);
        fwAnimId = null;
      }
      ctx.clearRect(0, 0, canvas.width, canvas.height);
    }

    window._startFireworks = startFireworks;
    window._stopFireworks = stopFireworks;
  })();

  // ==================== 💩 狗屎雨特效 ====================
  (function() {
    const canvas = document.getElementById('specialFxCanvas');
    const ctx = canvas.getContext('2d');
    let poops = [], splats = [], animId = null, isRunning = false;
    let spawnTimer = 0, totalTime = 0;
    const MAX_TIME = 8000; // 持续8秒

    function resize() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    class PoopParticle {
      constructor() {
        this.x = Math.random() * canvas.width;
        this.y = -(Math.random() * 200 + 40);
        this.size = Math.random() * 35 + 22;
        this.vy = Math.random() * 4 + 2.5;
        this.vx = (Math.random() - 0.5) * 5;
        this.rot = Math.random() * 360;
        this.rotSpeed = (Math.random() - 0.5) * 8;
        this.opacity = 1;
        this.wobbleAmp = Math.random() * 2 + 1;
        this.wobbleSpeed = Math.random() * 0.05 + 0.02;
        this.wobbleOffset = Math.random() * Math.PI * 2;
      }

      update() {
        this.y += this.vy;
        this.vy += 0.18;
        this.x += this.vx + Math.sin(totalTime * this.wobbleSpeed + this.wobbleOffset) * this.wobbleAmp;
        this.rot += this.rotSpeed;
        return this.y < canvas.height + 80;
      }

      draw(ctx) {
        ctx.save();
        ctx.translate(this.x, this.y);
        ctx.rotate(this.rot * Math.PI / 180);
        ctx.globalAlpha = Math.min(1, this.opacity);
        ctx.font = `${this.size}px serif`;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText('💩', 0, 0);
        // 添加阴影增强立体感
        ctx.shadowColor = 'rgba(60, 30, 10, 0.4)';
        ctx.shadowBlur = 8;
        ctx.fillText('💩', 0, 0);
        ctx.restore();
      }
    }

    class Splat {
      constructor(x, y, size) {
        this.x = x;
        this.y = y;
        this.size = size;
        this.life = 1;
        this.decay = 0.008;
        this.particles = [];
        // 溅射碎片
        for (let i = 0; i < 12; i++) {
          const angle = Math.random() * Math.PI * 2;
          const speed = Math.random() * 4 + 1;
          this.particles.push({
            x: 0, y: 0,
            vx: Math.cos(angle) * speed,
            vy: Math.sin(angle) * speed - 3,
            life: 1,
            size: Math.random() * 6 + 2
          });
        }
      }

      update() {
        this.life -= this.decay;
        for (const p of this.particles) {
          p.x += p.vx;
          p.y += p.vy;
          p.vy += 0.15;
          p.life -= 0.02;
        }
        return this.life > 0;
      }

      draw(ctx) {
        // 主体飞溅印记
        ctx.save();
        ctx.translate(this.x, this.y);
        ctx.globalAlpha = this.life * 0.8;
        ctx.font = `${this.size * 1.3}px serif`;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText('💩', 0, 0);
        ctx.restore();
        // 溅射碎片
        for (const p of this.particles) {
          if (p.life <= 0) continue;
          ctx.save();
          ctx.translate(this.x + p.x, this.y + p.y);
          ctx.globalAlpha = p.life * 0.7;
          ctx.fillStyle = '#5c3a1e';
          ctx.beginPath();
          ctx.arc(0, 0, p.size, 0, Math.PI * 2);
          ctx.fill();
          ctx.restore();
        }
      }
    }

    function animate() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      totalTime++;

      // 持续生成便便
      spawnTimer++;
      const spawnRate = totalTime < 100 ? 4 : (totalTime < 300 ? 2 : 3);
      if (spawnTimer > spawnRate && totalTime < MAX_TIME / 16) {
        poops.push(new PoopParticle());
        spawnTimer = 0;
        // 批量轰炸
        if (Math.random() < 0.25) {
          for (let i = 0; i < 5; i++) {
            setTimeout(() => poops.push(new PoopParticle()), i * 60);
          }
        }
      }

      // 更新便便
      for (let i = poops.length - 1; i >= 0; i--) {
        const alive = poops[i].update();
        poops[i].draw(ctx);
        if (!alive) {
          // 触底生成飞溅
          splats.push(new Splat(poops[i].x, canvas.height - 30, poops[i].size));
          poops.splice(i, 1);
        }
      }

      // 更新飞溅
      for (let i = splats.length - 1; i >= 0; i--) {
        const alive = splats[i].update();
        splats[i].draw(ctx);
        if (!alive) splats.splice(i, 1);
      }

      // 底部累积层
      const bottomPoops = splats.filter(() => true).length;
      if (bottomPoops > 0) {
        ctx.fillStyle = 'rgba(80, 40, 15, 0.15)';
        ctx.fillRect(0, canvas.height - 10, canvas.width, 10);
      }

      if (totalTime < MAX_TIME / 16 || poops.length > 0 || splats.length > 0) {
        animId = requestAnimationFrame(animate);
      } else {
        stopPoopRain();
      }
    }

    function startPoopRain() {
      if (animId) { cancelAnimationFrame(animId); animId = null; }
      isRunning = true;
      poops = [];
      splats = [];
      spawnTimer = 0;
      totalTime = 0;
      resize();
      // 初始齐射
      for (let i = 0; i < 12; i++) {
        setTimeout(() => poops.push(new PoopParticle()), i * 80);
      }
      animate();
    }

    function stopPoopRain() {
      isRunning = false;
      if (animId) { cancelAnimationFrame(animId); animId = null; }
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      poops = [];
      splats = [];
    }

    window._startPoopRain = startPoopRain;
    window._stopPoopRain = stopPoopRain;
  })();

  // ==================== 🐟🚲 鱼骑自行车特效 ====================
  (function() {
    const canvas = document.getElementById('specialFxCanvas');
    const ctx = canvas.getContext('2d');
    let fishes = [], bubbles = [], animId = null, isRunning = false;
    let totalTime = 0;
    const MAX_TIME = 12000;

    function resize() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    class Bubble {
      constructor(x, y) {
        this.x = x + (Math.random() - 0.5) * 40;
        this.y = y;
        this.size = Math.random() * 8 + 4;
        this.speed = Math.random() * 0.8 + 0.4;
        this.wobble = Math.random() * Math.PI * 2;
        this.opacity = Math.random() * 0.5 + 0.3;
      }
      update() {
        this.y -= this.speed;
        this.wobble += 0.03;
        this.x += Math.sin(this.wobble) * 0.5;
        return this.y > -20;
      }
      draw(ctx) {
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(100, 200, 255, ${this.opacity})`;
        ctx.fill();
        ctx.strokeStyle = `rgba(150, 220, 255, ${this.opacity * 0.6})`;
        ctx.lineWidth = 1;
        ctx.stroke();
        // 高光
        ctx.beginPath();
        ctx.arc(this.x - this.size * 0.3, this.y - this.size * 0.3, this.size * 0.3, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(255, 255, 255, ${this.opacity * 0.7})`;
        ctx.fill();
      }
    }

    class FishBicycle {
      constructor() {
        this.y = Math.random() * canvas.height * 0.65 + canvas.height * 0.08;
        this.speed = Math.random() * 2.5 + 1.5;
        this.direction = Math.random() > 0.5 ? 1 : -1;
        this.x = this.direction === 1 ? -80 : canvas.width + 80;
        this.fishSize = Math.random() * 18 + 30;
        this.bikeSize = Math.random() * 20 + 36;
        this.bobAmp = Math.random() * 6 + 3;
        this.bobSpeed = Math.random() * 0.06 + 0.04;
        this.bobOffset = Math.random() * Math.PI * 2;
        this.bubbleTimer = 0;
        this.bubbleRate = Math.floor(Math.random() * 15 + 8);
      }

      update() {
        this.x += this.speed * this.direction;
        this.bubbleTimer++;
        if (this.bubbleTimer > this.bubbleRate) {
          bubbles.push(new Bubble(this.x, this.y - this.fishSize / 2));
          this.bubbleTimer = 0;
        }
        const outOfBounds = this.direction === 1 ?
          this.x > canvas.width + 100 :
          this.x < -100;
        return !outOfBounds;
      }

      draw(ctx) {
        const bobY = Math.sin(totalTime * this.bobSpeed + this.bobOffset) * this.bobAmp;
        const y = this.y + bobY;
        const flip = this.direction === -1;

        ctx.save();
        ctx.translate(this.x, y);
        if (flip) ctx.scale(-1, 1);

        // 自行车 🚲
        ctx.font = `${this.bikeSize}px serif`;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText('🚲', 0, 5);

        // 鱼 🐟 骑在自行车上面
        ctx.font = `${this.fishSize}px serif`;
        ctx.fillText('🐟', 8, -this.bikeSize * 0.35);

        ctx.restore();
      }
    }

    function animate() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      totalTime++;

      // 水波纹底部
      const gradient = ctx.createLinearGradient(0, canvas.height - 80, 0, canvas.height);
      gradient.addColorStop(0, 'rgba(30, 120, 200, 0)');
      gradient.addColorStop(0.5, 'rgba(30, 120, 200, 0.12)');
      gradient.addColorStop(1, 'rgba(30, 120, 200, 0.25)');
      ctx.fillStyle = gradient;
      ctx.fillRect(0, canvas.height - 80, canvas.width, 80);

      // 水面波纹
      ctx.strokeStyle = 'rgba(100, 180, 230, 0.3)';
      ctx.lineWidth = 2;
      for (let i = 0; i < 6; i++) {
        ctx.beginPath();
        const baseY = canvas.height - 50 + i * 12;
        for (let x = 0; x < canvas.width; x += 5) {
          const waveY = baseY + Math.sin(x * 0.02 + totalTime * 0.05 + i) * 5;
          if (x === 0) ctx.moveTo(x, waveY);
          else ctx.lineTo(x, waveY);
        }
        ctx.stroke();
      }

      // 鱼自行车
      if (totalTime < MAX_TIME / 16) {
        const targetCount = Math.min(6, Math.floor(totalTime / 60) + 2);
        while (fishes.length < targetCount) {
          fishes.push(new FishBicycle());
        }
      }

      for (let i = fishes.length - 1; i >= 0; i--) {
        const alive = fishes[i].update();
        fishes[i].draw(ctx);
        if (!alive) fishes.splice(i, 1);
      }

      // 气泡
      for (let i = bubbles.length - 1; i >= 0; i--) {
        const alive = bubbles[i].update();
        bubbles[i].draw(ctx);
        if (!alive) bubbles.splice(i, 1);
      }

      if (totalTime < MAX_TIME / 16 || fishes.length > 0 || bubbles.length > 0) {
        animId = requestAnimationFrame(animate);
      } else {
        stopFishBicycle();
      }
    }

    function startFishBicycle() {
      if (animId) { cancelAnimationFrame(animId); animId = null; }
      isRunning = true;
      fishes = [];
      bubbles = [];
      totalTime = 0;
      resize();
      // 初始鱼群
      for (let i = 0; i < 3; i++) {
        setTimeout(() => fishes.push(new FishBicycle()), i * 300);
      }
      animate();
    }

    function stopFishBicycle() {
      isRunning = false;
      if (animId) { cancelAnimationFrame(animId); animId = null; }
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      fishes = [];
      bubbles = [];
    }

    window._startFishBicycle = startFishBicycle;
    window._stopFishBicycle = stopFishBicycle;
  })();
