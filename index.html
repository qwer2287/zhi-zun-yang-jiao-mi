<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>至尊羊角蜜文学</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=ZCOOL+KuaiLe&family=Noto+Serif+SC:wght@400;700;900&display=swap');

  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    min-height: 100vh;
    background: #1a0a00;
    overflow: hidden;
    font-family: 'Noto Serif SC', 'SimSun', 'STSong', serif;
    cursor: default;
    user-select: none;
  }

  /* ========== 粒子层背景 ========== */
  .particles-bg {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 0;
  }

  /* ========== 主容器 ========== */
  .main-container {
    position: relative;
    z-index: 10;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 20px;
  }

  /* ========== 装饰边框 ========== */
  .decorative-border {
    position: relative;
    width: min(700px, 95vw);
    padding: 50px 40px;
    background: linear-gradient(180deg,
      rgba(60, 20, 10, 0.85) 0%,
      rgba(40, 15, 8, 0.9) 50%,
      rgba(60, 20, 10, 0.85) 100%);
    border: 3px solid #8b6914;
    border-radius: 8px;
    box-shadow:
      0 0 30px rgba(255, 180, 60, 0.15),
      inset 0 0 60px rgba(139, 105, 20, 0.08),
      0 0 0 12px rgba(30, 10, 5, 0.7),
      0 0 0 15px #8b6914,
      0 0 0 18px rgba(30, 10, 5, 0.7);
    text-align: center;
    overflow: visible;
  }

  /* 四角纹饰 */
  .corner-decoration {
    position: absolute;
    width: 40px; height: 40px;
    border-color: #c9972e;
    border-style: solid;
    pointer-events: none;
  }
  .corner-decoration.top-left     { top: -5px;  left: -5px;  border-width: 4px 0 0 4px; }
  .corner-decoration.top-right    { top: -5px;  right: -5px; border-width: 4px 4px 0 0; }
  .corner-decoration.bottom-left  { bottom: -5px; left: -5px; border-width: 0 0 4px 4px; }
  .corner-decoration.bottom-right { bottom: -5px; right: -5px;border-width: 0 4px 4px 0; }

  /* ========== 标题 ========== */
  .site-title {
    font-family: 'Ma Shan Zheng', 'ZCOOL KuaiLe', cursive;
    font-size: clamp(32px, 6vw, 52px);
    color: #f0c060;
    text-shadow:
      0 0 20px rgba(240, 180, 80, 0.5),
      0 2px 4px rgba(0, 0, 0, 0.6),
      0 0 60px rgba(240, 160, 40, 0.3);
    letter-spacing: 6px;
    margin-bottom: 8px;
    animation: titleGlow 3s ease-in-out infinite;
  }

  @keyframes titleGlow {
    0%, 100% { text-shadow: 0 0 20px rgba(240, 180, 80, 0.5), 0 2px 4px rgba(0,0,0,0.6), 0 0 60px rgba(240,160,40,0.3); }
    50%      { text-shadow: 0 0 35px rgba(255, 200, 100, 0.8), 0 2px 4px rgba(0,0,0,0.6), 0 0 90px rgba(255,180,60,0.5); }
  }

  .subtitle {
    font-family: 'Noto Serif SC', serif;
    font-size: clamp(14px, 2.5vw, 18px);
    color: #c9972e;
    letter-spacing: 8px;
    margin-bottom: 30px;
    opacity: 0.8;
  }

  /* ========== 分隔线 ========== */
  .divider {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    margin-bottom: 30px;
  }
  .divider-line {
    width: 60px; height: 1px;
    background: linear-gradient(90deg, transparent, #c9972e, transparent);
  }
  .divider-diamond {
    width: 8px; height: 8px;
    background: #c9972e;
    transform: rotate(45deg);
  }

  /* ========== 输入区域 ========== */
  .input-section {
    position: relative;
    margin-bottom: 25px;
  }

  .creative-input {
    width: 100%;
    min-height: 160px;
    padding: 20px;
    background: rgba(20, 10, 5, 0.7);
    border: 2px solid #6b4f1a;
    border-radius: 6px;
    color: #e0c080;
    font-family: 'Noto Serif SC', serif;
    font-size: 16px;
    line-height: 1.8;
    resize: vertical;
    outline: none;
    transition: all 0.4s ease;
    letter-spacing: 1px;
  }

  .creative-input::placeholder {
    color: rgba(200, 160, 100, 0.35);
    font-style: italic;
    letter-spacing: 2px;
  }

  .creative-input:focus {
    border-color: #c9972e;
    box-shadow:
      0 0 20px rgba(201, 151, 46, 0.2),
      inset 0 0 30px rgba(201, 151, 46, 0.05);
    background: rgba(25, 12, 6, 0.8);
  }

  /* ========== 按钮 ========== */
  .btn-create {
    position: relative;
    display: inline-block;
    padding: 14px 55px;
    font-family: 'Ma Shan Zheng', 'ZCOOL KuaiLe', cursive;
    font-size: 22px;
    letter-spacing: 4px;
    color: #1a0800;
    background: linear-gradient(180deg, #e8b840 0%, #c48820 50%, #a06810 100%);
    border: 2px solid #8b6914;
    border-radius: 4px;
    cursor: pointer;
    transition: all 0.3s ease;
    box-shadow:
      0 4px 15px rgba(200, 140, 40, 0.3),
      0 0 0 4px rgba(30, 10, 5, 0.5),
      0 0 0 6px #6b4f1a;
    overflow: hidden;
  }

  .btn-create::before {
    content: '';
    position: absolute;
    top: 0; left: -100%;
    width: 100%; height: 50%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.25), transparent);
    transition: left 0.5s ease;
  }

  .btn-create:hover {
    background: linear-gradient(180deg, #f5c850 0%, #d49830 50%, #b07818 100%);
    box-shadow:
      0 6px 25px rgba(220, 160, 50, 0.45),
      0 0 0 4px rgba(30, 10, 5, 0.5),
      0 0 0 6px #6b4f1a;
    transform: translateY(-2px);
  }

  .btn-create:hover::before {
    left: 100%;
  }

  .btn-create:active {
    transform: translateY(1px);
    box-shadow:
      0 2px 8px rgba(200, 140, 40, 0.3),
      0 0 0 4px rgba(30, 10, 5, 0.5),
      0 0 0 6px #6b4f1a;
  }

  /* ========== 成功弹窗 ========== */
  .overlay {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: rgba(0, 0, 0, 0);
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: center;
    pointer-events: none;
    transition: background 0.6s ease;
  }

  .overlay.active {
    background: rgba(0, 0, 0, 0.75);
    pointer-events: all;
  }

  .success-modal {
    background: linear-gradient(180deg,
      rgba(50, 15, 5, 0.95) 0%,
      rgba(35, 10, 5, 0.97) 50%,
      rgba(50, 15, 5, 0.95) 100%);
    border: 3px solid #d4a030;
    border-radius: 8px;
    padding: 50px 40px;
    text-align: center;
    max-width: 550px;
    width: 90vw;
    box-shadow:
      0 0 60px rgba(255, 180, 60, 0.3),
      inset 0 0 80px rgba(200, 140, 40, 0.08),
      0 0 0 10px rgba(30, 10, 5, 0.6),
      0 0 0 13px #8b6914;
    transform: scale(0.7) translateY(30px);
    opacity: 0;
    transition: all 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    position: relative;
    z-index: 101;
  }

  .overlay.active .success-modal {
    transform: scale(1) translateY(0);
    opacity: 1;
  }

  .success-icon {
    font-size: 60px;
    margin-bottom: 15px;
    animation: bounceIcon 0.8s ease-in-out infinite alternate;
  }

  @keyframes bounceIcon {
    0% { transform: translateY(0) scale(1); }
    100% { transform: translateY(-10px) scale(1.08); }
  }

  .success-title {
    font-family: 'Ma Shan Zheng', cursive;
    font-size: clamp(26px, 5vw, 38px);
    color: #f0c040;
    text-shadow: 0 0 30px rgba(240, 180, 60, 0.6);
    letter-spacing: 3px;
    margin-bottom: 8px;
    line-height: 1.5;
  }

  .success-subtitle {
    font-family: 'Noto Serif SC', serif;
    font-size: 16px;
    color: #c9972e;
    letter-spacing: 2px;
    margin-bottom: 25px;
    opacity: 0.8;
  }

  .seal-stamp {
    display: inline-block;
    width: 85px; height: 85px;
    border: 4px solid #c03020;
    border-radius: 50%;
    color: #c03020;
    font-family: 'Ma Shan Zheng', cursive;
    font-size: 18px;
    line-height: 85px;
    text-align: center;
    transform: rotate(-15deg);
    opacity: 0.85;
    margin-bottom: 20px;
    box-shadow: 0 0 10px rgba(192, 48, 32, 0.25);
    transition: all 0.4s ease;
  }

  .seal-stamp.super-seal {
    width: 100px; height: 100px;
    border-width: 5px;
    border-color: #ff2020;
    color: #ff2020;
    font-size: 22px;
    line-height: 100px;
    box-shadow: 0 0 30px rgba(255, 30, 20, 0.6);
    animation: sealPulse 0.8s ease-in-out infinite alternate;
  }

  @keyframes sealPulse {
    0% { transform: rotate(-15deg) scale(1); box-shadow: 0 0 20px rgba(255, 30, 20, 0.5); }
    100% { transform: rotate(-15deg) scale(1.1); box-shadow: 0 0 45px rgba(255, 30, 20, 0.85); }
  }

  .btn-close {
    display: inline-block;
    padding: 10px 40px;
    font-family: 'Noto Serif SC', serif;
    font-size: 16px;
    letter-spacing: 3px;
    color: #d4a030;
    background: transparent;
    border: 1px solid #8b6914;
    border-radius: 4px;
    cursor: pointer;
    transition: all 0.3s ease;
  }

  .btn-close:hover {
    background: rgba(200, 140, 40, 0.15);
    border-color: #c9972e;
    color: #f0c060;
  }

  /* ========== Canvas 烟花层 ========== */
  #fireworksCanvas {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 50;
  }

  /* ========== 飘落花瓣粒子 ========== */
  .falling-petal {
    position: fixed;
    pointer-events: none;
    z-index: 5;
    animation: petalFall linear forwards;
  }

  @keyframes petalFall {
    0% {
      transform: translateY(-10vh) rotate(0deg) translateX(0);
      opacity: 1;
    }
    70% {
      opacity: 0.7;
    }
    100% {
      transform: translateY(110vh) rotate(720deg) translateX(var(--drift));
      opacity: 0;
    }
  }

  /* ========== 响应式 ========== */
  @media (max-width: 480px) {
    .decorative-border {
      padding: 30px 20px;
    }
    .btn-create {
      padding: 12px 35px;
      font-size: 18px;
    }
    .success-modal {
      padding: 30px 20px;
    }
  }
</style>
</head>
<body>

<!-- 粒子背景 -->
<canvas class="particles-bg" id="particlesBg"></canvas>

<!-- 烟花 Canvas -->
<canvas id="fireworksCanvas"></canvas>

<!-- 主界面 -->
<div class="main-container" id="mainPage">
  <div class="decorative-border">
    <div class="corner-decoration top-left"></div>
    <div class="corner-decoration top-right"></div>
    <div class="corner-decoration bottom-left"></div>
    <div class="corner-decoration bottom-right"></div>

    <h1 class="site-title">至尊羊角蜜文学</h1>
    <p class="subtitle">· 笔 落 惊 风 雨 ·</p>

    <div class="divider">
      <span class="divider-line"></span>
      <span class="divider-diamond"></span>
      <span class="divider-line"></span>
    </div>

    <div class="input-section">
      <textarea
        class="creative-input"
        id="creativeInput"
        placeholder="在此挥毫泼墨，写下您心中的故事…"
      ></textarea>
    </div>

    <button class="btn-create" id="btnCreate" onclick="startCreation()">
      完 成 创 作
    </button>
  </div>
</div>

<!-- 成功弹窗 -->
<div class="overlay" id="overlay">
  <div class="success-modal">
    <div class="success-icon" id="successIcon">🏆</div>
    <h2 class="success-title" id="successTitle">恭喜你成为<br>至尊羊角蜜网签约作者</h2>
    <p class="success-subtitle" id="successSubtitle">—— 妙笔生花 · 未来可期 ——</p>
    <div class="seal-stamp" id="sealStamp">签 约</div>
    <br>
    <button class="btn-close" onclick="closeModal()">朕 知 道 了</button>
  </div>
</div>

<script>
  // ==================== 粒子背景 ====================
  (function() {
    const canvas = document.getElementById('particlesBg');
    const ctx = canvas.getContext('2d');
    let particles = [];
    let animId;

    function resize() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    class Particle {
      constructor() {
        this.reset();
      }
      reset() {
        this.x = Math.random() * canvas.width;
        this.y = Math.random() * canvas.height;
        this.size = Math.random() * 2 + 0.5;
        this.speedY = Math.random() * 0.3 + 0.1;
        this.speedX = (Math.random() - 0.5) * 0.2;
        this.opacity = Math.random() * 0.5 + 0.15;
        this.glow = Math.random() * 0.5;
      }
      update() {
        this.y -= this.speedY;
        this.x += this.speedX;
        if (this.y < -10) { this.y = canvas.height + 10; this.x = Math.random() * canvas.width; }
        if (this.x < -10) this.x = canvas.width + 10;
        if (this.x > canvas.width + 10) this.x = -10;
      }
      draw() {
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(240, 180, 80, ${this.opacity + this.glow * Math.sin(Date.now() * 0.002 + this.x)})`;
        ctx.fill();
      }
    }

    for (let i = 0; i < 80; i++) {
      particles.push(new Particle());
    }

    function animate() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      particles.forEach(p => { p.update(); p.draw(); });
      animId = requestAnimationFrame(animate);
    }
    animate();
  })();

  // ==================== 飘落花瓣 ====================
  function createPetal() {
    const petal = document.createElement('div');
    petal.className = 'falling-petal';
    const chars = ['🌸', '🍂', '🏵️', '💮', '🌺', '✿'];
    petal.textContent = chars[Math.floor(Math.random() * chars.length)];
    petal.style.left = Math.random() * 95 + '%';
    petal.style.top = '-30px';
    petal.style.fontSize = (Math.random() * 18 + 12) + 'px';
    petal.style.setProperty('--drift', (Math.random() * 120 - 60) + 'px');
    petal.style.animationDuration = (Math.random() * 6 + 8) + 's';
    petal.style.opacity = Math.random() * 0.6 + 0.3;
    document.body.appendChild(petal);

    setTimeout(() => {
      if (petal.parentNode) petal.parentNode.removeChild(petal);
    }, 15000);
  }

  // 持续飘落
  setInterval(() => {
    if (Math.random() < 0.5) createPetal();
  }, 1800);
  for (let i = 0; i < 5; i++) setTimeout(createPetal, i * 400);

  // ==================== 烟花特效 ====================
  (function() {
    const canvas = document.getElementById('fireworksCanvas');
    const ctx = canvas.getContext('2d');
    let fireworks = [];
    let fwAnimId = null;
    let isRunning = false;

    function resize() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    class Spark {
      constructor(x, y, color) {
        this.x = x;
        this.y = y;
        const angle = Math.random() * Math.PI * 2;
        const speed = Math.random() * 6 + 2;
        this.vx = Math.cos(angle) * speed;
        this.vy = Math.sin(angle) * speed;
        this.color = color;
        this.life = 1;
        this.decay = Math.random() * 0.015 + 0.008;
        this.size = Math.random() * 3 + 1.5;
        this.gravity = 0.03;
        this.trail = [];
      }

      update() {
        this.trail.push({ x: this.x, y: this.y, life: this.life });
        if (this.trail.length > 8) this.trail.shift();

        this.x += this.vx;
        this.y += this.vy;
        this.vy += this.gravity;
        this.vx *= 0.99;
        this.life -= this.decay;
      }

      draw() {
        // 拖尾
        for (let i = 0; i < this.trail.length; i++) {
          const t = this.trail[i];
          const alpha = (i / this.trail.length) * this.life * 0.4;
          ctx.beginPath();
          ctx.arc(t.x, t.y, this.size * 0.6, 0, Math.PI * 2);
          ctx.fillStyle = this.color.replace('1)', `${alpha})`);
          ctx.fill();
        }
        // 主体
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fillStyle = this.color.replace('1)', `${Math.max(0, this.life)})`);
        ctx.fill();
        // 光晕
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size * 2.5, 0, Math.PI * 2);
        ctx.fillStyle = this.color.replace('1)', `${Math.max(0, this.life * 0.2)})`);
        ctx.fill();
      }
    }

    class Rocket {
      constructor(enhanced = false) {
        this.x = Math.random() * canvas.width * 0.8 + canvas.width * 0.1;
        this.y = canvas.height;
        this.targetY = Math.random() * canvas.height * 0.5 + canvas.height * 0.08;
        this.speed = Math.random() * 4 + 5;
        this.enhanced = enhanced;
        this.color = enhanced ? megaColor() : randomFireworkColor();
        this.trailParticles = [];
        this.exploded = false;
      }

      update() {
        if (!this.exploded) {
          this.trailParticles.push({
            x: this.x + (Math.random() - 0.5) * 3,
            y: this.y,
            life: 1
          });
          if (this.trailParticles.length > 20) this.trailParticles.shift();

          this.y -= this.speed;
          if (this.y <= this.targetY) {
            this.explode();
            return false;
          }
          return true;
        }
        return false;
      }

      draw() {
        if (this.exploded) return;
        // 火箭拖尾
        for (let i = 0; i < this.trailParticles.length; i++) {
          const p = this.trailParticles[i];
          const alpha = (i / this.trailParticles.length) * 0.5;
          ctx.beginPath();
          ctx.arc(p.x, p.y, 2, 0, Math.PI * 2);
          ctx.fillStyle = `rgba(255, 200, 80, ${alpha})`;
          ctx.fill();
        }
        // 火箭头
        ctx.beginPath();
        ctx.arc(this.x, this.y, 3, 0, Math.PI * 2);
        ctx.fillStyle = '#fff';
        ctx.fill();
      }

      explode() {
        this.exploded = true;
        const baseSparks = this.enhanced ? 220 : 80;
        const sparkCount = Math.floor(Math.random() * 60 + baseSparks);
        for (let i = 0; i < sparkCount; i++) {
          const s = new Spark(this.x, this.y, this.color);
          if (this.enhanced) {
            s.size = Math.random() * 6 + 2.5;
            s.decay = Math.random() * 0.006 + 0.004;
            s.vx *= 1.6; s.vy *= 1.6;
          }
          fireworks.push(s);
        }
        // 内层粒子（更亮更密）
        const innerCount = this.enhanced ? 100 : 30;
        for (let i = 0; i < innerCount; i++) {
          const s = new Spark(this.x, this.y, this.color);
          s.vx *= 0.5; s.vy *= 0.5;
          s.size *= this.enhanced ? 3 : 1.5;
          s.decay *= 0.7;
          fireworks.push(s);
        }
        // 震撼模式：第二圈超大光环
        if (this.enhanced) {
          for (let i = 0; i < 60; i++) {
            const s = new Spark(this.x, this.y, 'rgba(255, 240, 180, 1)');
            s.vx *= 0.25; s.vy *= 0.25;
            s.size = Math.random() * 4 + 3;
            s.decay = 0.004;
            fireworks.push(s);
          }
        }
      }
    }

    function randomFireworkColor() {
      const colors = [
        'rgba(255, 80, 60, 1)',   // 红
        'rgba(255, 180, 40, 1)',  // 金
        'rgba(255, 220, 60, 1)',  // 亮金
        'rgba(255, 100, 180, 1)', // 粉
        'rgba(220, 60, 255, 1)',  // 紫
        'rgba(60, 200, 255, 1)',  // 蓝
        'rgba(80, 255, 120, 1)',  // 绿
        'rgba(255, 150, 80, 1)',  // 橙
        'rgba(255, 255, 200, 1)', // 白
        'rgba(200, 50, 50, 1)',   // 深红
      ];
      return colors[Math.floor(Math.random() * colors.length)];
    }

    function megaColor() {
      const colors = [
        'rgba(255, 40, 20, 1)',   // 炽红
        'rgba(255, 200, 15, 1)',  // 耀金
        'rgba(255, 240, 50, 1)',  // 炫金
        'rgba(255, 70, 140, 1)',  // 玫红
        'rgba(255, 160, 20, 1)',  // 橙金
        'rgba(255, 20, 50, 1)',   // 烈红
        'rgba(255, 220, 80, 1)',  // 白金
        'rgba(210, 15, 25, 1)',   // 中国红
      ];
      return colors[Math.floor(Math.random() * colors.length)];
    }

    const rockets = [];
    let rocketTimer = 0;
    let currentMode = 'normal';

    function animate() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      // 发射火箭
      rocketTimer++;
      const fireRate = currentMode === 'enhanced' ? 3 : 8;
      const maxRockets = currentMode === 'enhanced' ? 25 : 6;
      if (rocketTimer > fireRate && rockets.length < maxRockets) {
        rockets.push(new Rocket(currentMode === 'enhanced'));
        rocketTimer = 0;
      }

      // 更新火箭
      for (let i = rockets.length - 1; i >= 0; i--) {
        const alive = rockets[i].update();
        rockets[i].draw();
        if (!alive) rockets.splice(i, 1);
      }

      // 更新烟花粒子
      for (let i = fireworks.length - 1; i >= 0; i--) {
        fireworks[i].update();
        fireworks[i].draw();
        if (fireworks[i].life <= 0) fireworks.splice(i, 1);
      }

      // 停止条件：没有东西在显示
      const stopDelay = currentMode === 'enhanced' ? 300 : 100;
      if (rockets.length === 0 && fireworks.length === 0 && rocketTimer > stopDelay) {
        stopFireworks();
        currentMode = 'normal';
        return;
      }

      fwAnimId = requestAnimationFrame(animate);
    }

    function startFireworks(enhanced = false) {
      // 停止当前烟花
      if (fwAnimId) {
        cancelAnimationFrame(fwAnimId);
        fwAnimId = null;
      }
      isRunning = true;
      rocketTimer = 0;
      fireworks = [];
      rockets.length = 0;
      currentMode = enhanced ? 'enhanced' : 'normal';
      // 初始发射一波
      const initialCount = enhanced ? 15 : 5;
      for (let i = 0; i < initialCount; i++) {
        setTimeout(() => rockets.push(new Rocket(enhanced)), i * (enhanced ? 80 : 200));
      }
      // 震撼模式：后续多波齐射
      if (enhanced) {
        for (let wave = 1; wave <= 4; wave++) {
          setTimeout(() => {
            for (let i = 0; i < 10; i++) {
              setTimeout(() => rockets.push(new Rocket(true)), i * 60);
            }
          }, wave * 2500);
        }
      }
      animate();
    }

    function stopFireworks() {
      isRunning = false;
      if (fwAnimId) {
        cancelAnimationFrame(fwAnimId);
        fwAnimId = null;
      }
      ctx.clearRect(0, 0, canvas.width, canvas.height);
    }

    window._startFireworks = startFireworks;
    window._stopFireworks = stopFireworks;
  })();

  // ==================== 主逻辑 ====================
  function startCreation() {
    const input = document.getElementById('creativeInput');
    const text = input.value.trim();
    const isSuper = (text === '诚愿99');

    // 动态切换弹窗内容
    const titleEl = document.getElementById('successTitle');
    const subtitleEl = document.getElementById('successSubtitle');
    const sealEl = document.getElementById('sealStamp');
    const iconEl = document.getElementById('successIcon');
    const modal = document.querySelector('.success-modal');

    if (isSuper) {
      titleEl.innerHTML = '世界上最有品之人';
      subtitleEl.textContent = '—— 慧眼识珠 · 品味超群 ——';
      sealEl.textContent = '至 尊';
      sealEl.classList.add('super-seal');
      iconEl.textContent = '👑';
      modal.style.borderColor = '#ff3030';
      modal.style.boxShadow = '0 0 80px rgba(255, 50, 30, 0.5), inset 0 0 100px rgba(255, 180, 40, 0.12), 0 0 0 10px rgba(30, 10, 5, 0.6), 0 0 0 13px #c03020';
    } else {
      titleEl.innerHTML = '恭喜你成为<br>至尊羊角蜜网签约作者';
      subtitleEl.textContent = '—— 妙笔生花 · 未来可期 ——';
      sealEl.textContent = '签 约';
      sealEl.classList.remove('super-seal');
      iconEl.textContent = '🏆';
      modal.style.borderColor = '#d4a030';
      modal.style.boxShadow = '0 0 60px rgba(255, 180, 60, 0.3), inset 0 0 80px rgba(200, 140, 40, 0.08), 0 0 0 10px rgba(30, 10, 5, 0.6), 0 0 0 13px #8b6914';
    }

    const overlay = document.getElementById('overlay');
    overlay.classList.add('active');

    // 启动烟花
    window._startFireworks(isSuper);

    // 震撼模式：持续追加更多波烟花
    if (isSuper) {
      setTimeout(() => window._startFireworks(true), 4500);
      setTimeout(() => window._startFireworks(true), 9000);
    }
  }

  function closeModal() {
    const overlay = document.getElementById('overlay');
    overlay.classList.remove('active');
    window._stopFireworks();
  }

  // ==================== 键盘快捷键 ====================
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') closeModal();
    if (e.key === 'Enter' && e.ctrlKey) startCreation();
  });

  console.log('🏮 至尊羊角蜜文学 — 大驾光临！');
  console.log('📜 愿君妙笔生花，一字千金。');
</script>
